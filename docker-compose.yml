services:
  mongo:
    image: mongo:7
    container_name: webisdom-mongo
    restart: always
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: webisdom-redis
    restart: always

  server:
    build:
      context: ./server
    container_name: webisdom-server
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env.docker
    depends_on:
      - mongo
      - redis

  client:
    build:
      context: ./client
    container_name: webisdom-client
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  mongo_data:
